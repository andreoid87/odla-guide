<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ODLA GUI Guide</title>
  <link rel="stylesheet" href="./style.css?v=20260402j">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h1>ODLA GUI Guide</h1>
      <p class="subtitle">Guida visuale interattiva delle finestre ODLA.</p>
      <p id="screen-counter" class="counter"></p>
      <nav id="screen-list" class="screen-list" aria-label="Schermate"></nav>
    </aside>

    <main class="content">
      <header class="content-header">
        <div>
          <h2 id="screen-title">Caricamento</h2>
          <p id="screen-description" class="screen-description"></p>
        </div>
      </header>

      <section class="viewer">
        <div id="canvas-wrap" class="canvas-wrap">
          <div class="canvas-tools">
            <div class="zoom-controls">
              <button id="zoom-out" class="editor-button" type="button" aria-label="Riduci zoom">-</button>
              <input id="zoom-range" class="zoom-range" type="range" min="50" max="300" step="10" value="100">
              <button id="zoom-in" class="editor-button" type="button" aria-label="Aumenta zoom">+</button>
              <button id="zoom-fit" class="editor-button" type="button">Adatta</button>
            </div>
            <span id="zoom-level" class="zoom-level">100%</span>
          </div>
          <div id="canvas-scroll" class="canvas-scroll">
            <div id="canvas-stage" class="canvas-stage">
              <img id="screen-image" class="screen-image" alt="">
              <div id="hotspot-layer" class="hotspot-layer"></div>
            </div>
          </div>
        </div>

        <aside id="detail-panel" class="detail-panel">
          <div class="detail-head">
            <h3 id="detail-title">Seleziona un'area</h3>
            <p id="detail-text">Clicca su una zona evidenziata dello screenshot per vedere nome e spiegazione.</p>
          </div>
          <div class="detail-meta">
            <span class="meta-label">Aree interattive</span>
            <div id="hotspot-list" class="hotspot-list"></div>
          </div>
        </aside>
      </section>
    </main>
  </div>

  <script src="./guide-data.js?v=20260402j"></script>
  <script src="./guide.js?v=20260402j"></script>
</body>
</html>
